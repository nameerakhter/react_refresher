<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button id="btn" onclick="onButtonClick()">Counter is 0</button>
  </body>

  <script>
    let count = 0;
    function onButtonClick() {
      const button = document.getElementById("btn").innerHTML;
      const value = button.split(" ")[2];
      console.log(value);
      const increaseValue = parseInt(value) + 1;
      document.getElementById("btn").innerHTML = `Counter is ${increaseValue}`;
    }
  </script>
</html>
<!-- A state change triggers a re-render and a re-render represents the actual DOM bein manipulated when the state changes -->
<!-- You usually have to define all your components once and then all you have to do is update the state of your app React takes care of the re-rendering -->
